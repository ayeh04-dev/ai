<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Platform</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<header>
    <nav class="navbar">
        <h1 class="logo">AI Platform</h1>
        <input type="text" id="search" placeholder="Search AI news...">
    </nav>
</header>

<!-- Hero -->
<section class="hero">
    <h2>Welcome to AI Platform</h2>
    <p>Explore AI news, tools, and interact with AI</p>
</section>

<!-- News Section -->
<section class="news">
    <h2>Latest AI News</h2>
    <div id="news-container"></div>
</section>

<!-- Chatbot -->
<div class="chatbot">
    <div class="chat-header">AI Assistant</div>
    <div class="chat-body" id="chat-body"></div>
    <input type="text" id="chat-input" placeholder="Ask AI something...">
</div>

<div class="news-container"></div>

<div class="news-card">
                <img src="https://images.unsplash.com/photo-1485827404703-89b55fcc595e" alt="robot">
                <h3>Robotics Advancements</h3>
</div>


<div class="news-card">
                <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b" alt="cybersecurity">
                <h3>Cybersecurity Alert</h3>
</div>




<script src="script.js"></script>
</body>
</html>
